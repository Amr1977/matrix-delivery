# Payment System Test Data
# This file contains test data for payment system integration tests
# All amounts are in EGP unless specified otherwise

# Commission calculation test cases
commission_test_data:
  - amount: 100
    description: "100 EGP order"
  - amount: 250
    description: "250 EGP order"
  - amount: 500
    description: "500 EGP order"
  - amount: 1000
    description: "1000 EGP order"
  - amount: 10000
    description: "10000 EGP large order"

# Payment methods configuration
payment_methods_data:
  - method: "stripe"
    display_name: "Stripe (Cards)"
    type: "digital"
  - method: "paypal"
    display_name: "PayPal"
    type: "digital"
  - method: "paymob_card"
    display_name: "Paymob Cards"
    type: "digital"
  - method: "paymob_wallet"
    display_name: "Paymob Wallets"
    type: "digital"
  - method: "crypto"
    display_name: "Crypto (USDC/USDT)"
    type: "digital"
  - method: "cod"
    display_name: "Cash on Delivery"
    type: "manual"

# Edge case test amounts
edge_case_amounts:
  - amount: 0.01
    description: "very small amount (1 cent)"
  - amount: 5
    description: "minimum digital payment"
  - amount: 1000000
    description: "very large amount (1M)"

# Invalid amounts for error testing
invalid_amounts:
  - amount: -10
    description: "negative amount"
    expected_error: "Amount must be greater than 0"
  - amount: 0
    description: "zero amount"
    expected_error: "Amount must be greater than 0"
  - amount: null
    description: "null amount"
    expected_error: "Invalid amount"
  - amount: undefined
    description: "undefined amount"
    expected_error: "Invalid amount"

# Revenue tracking test scenarios
revenue_scenarios:
  - name: "daily_revenue"
    transactions:
      - amount: 100
        method: "stripe"
      - amount: 200
        method: "paypal"
      - amount: 150
        method: "paymob_card"
  - name: "weekly_revenue"
    transactions:
      - amount: 500
        method: "crypto"
      - amount: 300
        method: "paymob_wallet"
      - amount: 750
        method: "stripe"

# Integration test scenarios
integration_scenarios:
  - name: "concurrent_payments"
    payments:
      - order_id: "order_1"
        amount: 100
        method: "stripe"
      - order_id: "order_2"
        amount: 200
        method: "paypal"
      - order_id: "order_3"
        amount: 150
        method: "paymob_card"
  - name: "mixed_payment_methods"
    payments:
      - order_id: "order_4"
        amount: 500
        method: "crypto"
      - order_id: "order_5"
        amount: 250
        method: "cod"
      - order_id: "order_6"
        amount: 300
        method: "paymob_wallet"
