# Payment Configuration Test Data
# This file contains expected configuration values for testing
# DO NOT use magic numbers in tests - reference this file instead

# Commission rate configuration
commission_config:
  decimal: 0.15  # 15% as decimal
  percent: 15    # 15% as percentage
  basis_points: 1500  # 15% in basis points (for smart contracts)

# Currency configuration
currencies:
  default: "EGP"
  supported:
    - "EGP"
    - "USD"
    - "EUR"

# Payment fees (as decimal)
payment_fees:
  card: 0.025      # 2.5%
  wallet: 0.025    # 2.5%
  crypto: 0        # No fee
  cod: 0           # No fee

# Minimum payment amounts (in default currency)
minimum_amounts:
  digital_payment: 5
  card: 5
  wallet: 5
  crypto: 5
  cod: 0

# Payment method enablement
payment_methods_enabled:
  card: true
  wallet: true
  crypto: true
  cod: true

# Crypto configuration
crypto_config:
  supported_tokens:
    - "USDC"
    - "USDT"
  network: "polygon"
  chain_id: 137
