# Add these lines to your Apache VirtualHost configuration for port 443 (SSL)

# Enable Rewrite Engine for WebSocket upgrades
RewriteEngine On
RewriteCond %{HTTP:Upgrade} =websocket [NC]
RewriteRule /(.*)           ws://localhost:5000/$1 [P,L]

# ProxyPass configuration for Socket.IO
# Ensure these come BEFORE generic ProxyPass / http://localhost:5000/
ProxyPass /socket.io/ ws://localhost:5000/socket.io/
ProxyPassReverse /socket.io/ ws://localhost:5000/socket.io/

# Existing configuration (keep this)
# ProxyPass / http://localhost:5000/
# ProxyPassReverse / http://localhost:5000/
