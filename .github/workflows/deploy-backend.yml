name: Deploy Backend

on:
  push:
    branches: [ main, master, feature/advanced-location-mapping ]
    paths:
      - 'backend/**'
      - 'scripts/migrate-map-location-picker.js'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd backend
        npm ci

    - name: Install test dependencies
      run: npm ci

    - name: Setup PostgreSQL for testing
      uses: harmon758/postgresql-action@v1
      with:
        postgresql version: '14'
        postgresql db: matrix_delivery_test
        postgresql user: postgres
        postgresql password: test_password

    - name: Run comprehensive tests
      run: npm run test:ci
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME_TEST: matrix_delivery_test
        DB_USER: postgres
        DB_PASSWORD: test_password

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: test-report-*.txt

    - name: Fail if tests don't meet threshold
      run: |
        if [ -f test-report-*.txt ]; then
          # Extract pass rate from test report
          PASS_RATE=$(grep "Success Rate" test-report-*.txt | grep -o "[0-9.]*%" | sed 's/%//')
          if [ "$PASS_RATE" -lt 85 ]; then
            echo "❌ Test pass rate ($PASS_RATE%) below required threshold (85%)"
            exit 1
          else
            echo "✅ Test pass rate ($PASS_RATE%) meets requirements"
          fi
        else
          echo "❌ No test report found"
          exit 1
        fi

    - name: Build application
      run: |
        cd backend
        npm run build 2>/dev/null || echo "No build script found"

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 2222 }}
        script: |
          # Navigate to project directory
          cd ${{ secrets.PROJECT_PATH }}

          # Backup current .env
          cp backend/.env backend/.env.backup.$(date +%Y%m%d_%H%M%S) 2>/dev/null || true

          # Pull latest changes (from the branch we're deploying)
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
          echo "🚀 Deploying branch: $CURRENT_BRANCH"
          git reset --hard HEAD
          git pull origin "$CURRENT_BRANCH" --no-edit --strategy=recursive --strategy-option=ours

          # Install dependencies
          npm ci --production

          # Check if production .env file exists on server (create if needed)
          if [[ ! -f "backend/.env" ]] || [[ $(grep -c "DB_PASSWORD=***REDACTED***" backend/.env) -eq 1 ]]; then
            echo "⚠️  Production .env file needs database credentials!"
            echo "💡 Please ensure backend/.env on the server has correct production database credentials"
            echo "💡 Current .env seems to use development credentials (DB_PASSWORD=***REDACTED***)"
            echo "💡 You may need to update: DB_HOST, DB_USER, DB_PASSWORD for production"
          fi

          # Run database health check (from backend directory)
          echo "🔍 Running database health check..."
          cd backend && node check-db-health.js

          # Run startup diagnostics (from backend directory)
          echo "🔍 Running startup diagnostics..."
          cd backend && node diagnose-startup.js

          # Check for and run database migrations (from project root)
          cd ..
          echo "🔄 Checking for database migrations..."
          if [[ "${GITHUB_REF#refs/heads/}" == "feature/advanced-location-mapping" ]] || [[ -f "scripts/migrate-map-location-picker.js" ]]; then
            echo "📦 Running map location picker database migration..."
            chmod +x scripts/migrate-map-location-picker.js
            ./scripts/migrate-map-location-picker.js

            if [[ $? -eq 0 ]]; then
              echo "✅ Database migration completed successfully!"
            else
              echo "❌ Database migration failed!"
              echo "Checking script details..."
              ls -la scripts/migrate-map-location-picker.js
              exit 1
            fi
          else
            echo "ℹ️  No database migration needed for this deployment"
          fi

          # Stop existing service gracefully (from project root)
          echo "🛑 Stopping existing processes..."
          pm2 stop ecosystem.config.js 2>/dev/null || true
          pm2 delete ecosystem.config.js 2>/dev/null || true

          # Additional cleanup - stop any lingering matrix-delivery-backend processes
          pm2 stop matrix-delivery-backend 2>/dev/null || true
          pm2 delete matrix-delivery-backend 2>/dev/null || true

          # Kill any processes using port 5000
          echo "🔪 Killing any processes using port 5000..."
          fuser -k 5000/tcp 2>/dev/null || true
          lsof -ti:5000 | xargs kill -9 2>/dev/null || true

          # Wait a moment for cleanup
          sleep 3

          # Start service with PM2
          echo "🚀 Starting service with PM2..."
          pm2 start ecosystem.config.js --env production
          pm2 save

          # Wait a moment for service to initialize
          sleep 5

          # Check PM2 status
          pm2 status

          # Health check with retry
          echo "Waiting for service to start..."
          for i in {1..6}; do
            if curl -f -s https://matrix-api.oldantique50.com/api/health > /dev/null; then
              echo "✅ Deployment successful!"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

          echo "❌ Health check failed after 6 attempts!"
          echo "📋 PM2 status:"
          pm2 status
          echo "📋 PM2 logs:"
          pm2 logs --lines 20
          echo "📋 Recent server logs:"
          tail -20 logs/pm2-out.log 2>/dev/null || echo "No out logs found"
          tail -20 logs/pm2-error.log 2>/dev/null || echo "No error logs found"
          exit 1
