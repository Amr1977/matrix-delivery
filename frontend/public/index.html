<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Matrix Heroes - P2P Delivery & Ride-Hailing Platform" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://matrix-delivery.web.app/" />
    <meta property="og:title" content="Matrix Heroes - Delivery & Ride-Hailing Platform" />
    <meta property="og:description" content="Modern P2P delivery and ride-hailing platform connecting customers with drivers for fast, reliable service." />
    <meta property="og:image" content="https://matrix-delivery.web.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Matrix Heroes - P2P Delivery & Ride-Hailing Platform" />
    <meta property="og:site_name" content="Matrix Heroes" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://matrix-delivery.web.app/" />
    <meta name="twitter:title" content="Matrix Heroes - Delivery & Ride-Hailing Platform" />
    <meta name="twitter:description" content="Modern P2P delivery and ride-hailing platform connecting customers with drivers for fast, reliable service." />
    <meta name="twitter:image" content="https://matrix-delivery.web.app/og-image.png" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Matrix Heroes - Delivery & Ride-Hailing Platform</title>
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .success-message {
        background: #D1FAE5 !important;
        color: #065F46 !important;
        border: 1px solid #A7F3D0 !important;
      }
      .loading-skeleton {
        background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
