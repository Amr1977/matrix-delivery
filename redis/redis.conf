# Redis configuration for Matrix Delivery Platform V2
# Bind to localhost only (not exposed to external network)
bind 127.0.0.1

# Require password authentication
requirepass YOUR_STRONG_REDIS_PASSWORD

# Enable AOF (Append-Only File) for persistence
appendonly yes
appendfsync everysec

# Disable RDB snapshots (using AOF only)
save ""

# Set max memory and eviction policy
maxmemory 128mb
maxmemory-policy allkeys-lru

# Enable protected mode (security)
protected-mode yes

# TCP keepalive for connection health
tcp-keepalive 60

# Log level
loglevel notice
logfile /var/log/redis/redis-server.log