<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName matrix-api.oldantique50.com

    # CRITICAL: Disable ModSecurity FIRST before any other directives
    <IfModule security2_module>
        SecRuleEngine Off
    </IfModule>

    # Security Headers
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Permissions-Policy "geolocation=(self), microphone=(), camera=()"

    # Remove server information
    Header always unset X-Powered-By
    Header always unset Server

    # CORS Headers - Let backend handle CORS completely
    # Do NOT set or unset CORS headers - let backend handle everything
    # This ensures the backend's CORS middleware works correctly

    # WebSocket support - must come before regular proxy
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://localhost:5000/$1 [P,L]

    # Regular proxy configuration
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/
    ProxyTimeout 3600

    # Proxy headers for HTTPS detection
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # Rate limiting (requires mod_ratelimit)
    <IfModule mod_ratelimit.c>
        <Location /api/auth>
            SetOutputFilter RATE_LIMIT
            SetEnv rate-limit 400
        </Location>
    </IfModule>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/matrix-api-error.log
    CustomLog ${APACHE_LOG_DIR}/matrix-api-access.log combined

    # SSL Configuration
    SSLCertificateFile /etc/letsencrypt/live/matrix-api.oldantique50.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/matrix-api.oldantique50.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # SSL Security
    SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder on
    SSLCompression off
    SSLSessionTickets off
</VirtualHost>
</IfModule>
