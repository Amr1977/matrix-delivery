android {
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

// Allow for signing
if (System.getenv("CAPACITOR_ANDROID_STUDIO_PROJECT")) {
    android {
        signingConfigs {
            release {
                storeFile file(System.getenv("CAPACITOR_KEYSTORE_PATH"))
                storePassword System.getenv("CAPACITOR_KEYSTORE_PASSWORD")
                keyAlias System.getenv("CAPACITOR_KEY_ALIAS")
                keyPassword System.getenv("CAPACITOR_KEY_PASSWORD")
            }
        }
        buildTypes {
            release {
                signingConfig signingConfigs.release
            }
        }
    }
}
