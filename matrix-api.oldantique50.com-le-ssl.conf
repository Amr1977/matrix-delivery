<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName matrix-api.oldantique50.com

    # Disable ModSecurity for API (Option B from above)
    <IfModule security2_module>
        SecRuleEngine Off
    </IfModule>

    # CORS Headers - Set once by Apache
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    Header always set Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization, Cache-Control, Pragma"
    Header always set Access-Control-Allow-Credentials "true"

    # Handle preflight OPTIONS requests
    <If "%{REQUEST_METHOD} == 'OPTIONS'">
        Header always set Access-Control-Max-Age "3600"
        Header always set Content-Type "text/plain; charset=utf-8"
        Header always set Content-Length "0"
    </If>

    RewriteEngine On
    
    # Return 200 for OPTIONS without proxying
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^(.*)$ $1 [R=200,L]

    # WebSocket support for Socket.IO
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://localhost:5000/$1" [P,L]

    # Regular HTTP proxy
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/

    # Increase timeout for long-polling
    ProxyTimeout 3600

    ErrorLog ${APACHE_LOG_DIR}/api-error.log
    CustomLog ${APACHE_LOG_DIR}/api-access.log combined

    SSLCertificateFile /etc/letsencrypt/live/matrix-api.oldantique50.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/matrix-api.oldantique50.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>